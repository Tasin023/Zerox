<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Torch Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0d1520;
      --border: #1a2a3a;
      --accent: #00c8ff;
      --accent2: #ff9500;
      --text: #c8dde8;
      --dim: #3a5060;
      --glow-blue: rgba(0,200,255,0.25);
      --glow-orange: rgba(255,149,0,0.3);
      --t: 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
      transition: background 0.6s ease;
    }

    body.torch-on {
      background: #0c1008;
    }

    /* Ambient glow background */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(0,200,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 50% 110%, rgba(255,149,0,0.05) 0%, transparent 70%);
      transition: opacity 0.6s ease;
    }
    body.torch-on .ambient {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,220,80,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(255,149,0,0.08) 0%, transparent 70%);
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,200,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 28px;
      transition: box-shadow 0.6s ease, border-color 0.6s ease;
    }
    body.torch-on .card {
      border-color: rgba(255,210,60,0.2);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(255,200,50,0.12);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      transition: color 0.6s ease;
    }
    body.torch-on .title { color: #ffd040; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      box-shadow: none;
      transition: background 0.4s, box-shadow 0.4s;
    }
    body.torch-on .status-dot {
      background: #ffcc00;
      box-shadow: 0 0 10px #ffcc00, 0 0 20px rgba(255,200,0,0.5);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { box-shadow: 0 0 6px #ffcc00, 0 0 14px rgba(255,200,0,0.4); }
      50%      { box-shadow: 0 0 14px #ffcc00, 0 0 30px rgba(255,200,0,0.6); }
    }

    /* SVG Countdown ring */
    .ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .ring-svg {
      width: 190px; height: 190px;
      transform: rotate(-90deg);
      filter: drop-shadow(0 0 0px transparent);
      transition: filter 0.6s ease;
    }
    body.torch-on .ring-svg {
      filter: drop-shadow(0 0 14px rgba(255,200,50,0.5));
    }

    .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .ring-prog {
      fill: none;
      stroke: var(--accent);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 534;
      stroke-dashoffset: 534;
      transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
    }
    body.torch-on .ring-prog { stroke: #ffcc00; }

    /* Center display inside ring */
    .ring-center {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .ring-wrap { position: relative; }
    .ring-center {
      inset: 0;
    }

    .time-display {
      font-family: 'Orbitron', monospace;
      font-size: 38px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 2px;
      transition: color 0.6s ease, text-shadow 0.6s ease;
      line-height: 1;
    }
    body.torch-on .time-display {
      color: #ffe066;
      text-shadow: 0 0 20px rgba(255,200,50,0.6);
    }

    .time-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      margin-top: 4px;
      transition: color 0.6s ease;
    }
    body.torch-on .time-label { color: #a07020; }

    /* Time preset quick buttons */
    .presets {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .preset-btn {
      flex: 1;
      padding: 8px 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .preset-btn:hover, .preset-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,200,255,0.06);
      box-shadow: 0 0 10px rgba(0,200,255,0.1);
    }

    /* Custom time input row */
    .custom-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .custom-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
    }
    .time-inputs {
      display: flex;
      gap: 6px;
      flex: 1;
      align-items: center;
    }
    .time-input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
    }
    .time-input-wrap span {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
    }
    .time-inp {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      padding: 10px 4px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .time-inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--glow-blue);
    }
    .time-inp::-webkit-inner-spin-button,
    .time-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
    .sep {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--dim);
      padding-bottom: 18px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -4px;
    }

    /* Main toggle button */
    .main-btn {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--accent);
      background: rgba(0,200,255,0.06);
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0,200,255,0.1);
      -webkit-tap-highlight-color: transparent;
      outline: none;
      position: relative;
      overflow: hidden;
    }
    .main-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .main-btn:active { transform: scale(0.97); }
    .main-btn:hover {
      background: rgba(0,200,255,0.12);
      box-shadow: 0 0 30px rgba(0,200,255,0.2);
    }
    body.torch-on .main-btn {
      border-color: #ffcc00;
      color: #ffcc00;
      background: rgba(255,200,0,0.08);
      box-shadow: 0 0 30px rgba(255,200,0,0.2);
    }
    body.torch-on .main-btn:hover {
      background: rgba(255,200,0,0.14);
    }

    /* Cancel btn */
    .cancel-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      display: none;
    }
    .cancel-btn.visible { display: block; }
    .cancel-btn:hover { border-color: #ff4444; color: #ff4444; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #111e2a;
      border: 1px solid #1e3040;
      color: #ff6b6b;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 12px 20px;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 99;
      max-width: 300px;
      text-align: center;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { color: #44ff99; border-color: #1e4030; }
  </style>
</head>
<body>
  <div class="ambient"></div>

  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="title">Torch Timer</div>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <!-- Ring + countdown -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 180 180">
        <circle class="ring-bg" cx="90" cy="90" r="85"/>
        <circle class="ring-prog" cx="90" cy="90" r="85" id="ringProg"/>
      </svg>
      <div class="ring-center">
        <div class="time-display" id="timeDisplay">00:00</div>
        <div class="time-label" id="timeLabel">set timer</div>
      </div>
    </div>

    <!-- Preset buttons -->
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(30)">30s</button>
      <button class="preset-btn" onclick="setPreset(60)">1m</button>
      <button class="preset-btn" onclick="setPreset(300)">5m</button>
      <button class="preset-btn" onclick="setPreset(600)">10m</button>
      <button class="preset-btn" onclick="setPreset(1800)">30m</button>
    </div>

    <div class="divider"></div>

    <!-- Custom input -->
    <div class="custom-row">
      <div class="custom-label">Custom</div>
      <div class="time-inputs">
        <div class="time-input-wrap">
          <input class="time-inp" type="number" id="inpHr" min="0" max="23" value="0" placeholder="0"/>
          <span>hr</span>
        </div>
        <div class="sep">:</div>
        <div class="time-input-wrap">
          <input class="time-inp" type="number" id="inpMin" min="0" max="59" value="0" placeholder="0"/>
          <span>min</span>
        </div>
        <div class="sep">:</div>
        <div class="time-input-wrap">
          <input class="time-inp" type="number" id="inpSec" min="0" max="59" value="30" placeholder="0"/>
          <span>sec</span>
        </div>
      </div>
    </div>

    <!-- Action buttons -->
    <button class="main-btn" id="mainBtn" onclick="handleMain()">START TORCH</button>
    <button class="cancel-btn" id="cancelBtn" onclick="handleCancel()">Cancel Timer</button>

  </div>

  <div id="toast"></div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let torchOn    = false;
    let stream     = null;
    let track      = null;
    let timerTotal = 0;   // seconds set
    let timerLeft  = 0;   // seconds remaining
    let countdown  = null;
    const CIRCUM   = 2 * Math.PI * 85; // ~534

    // ─── DOM refs ────────────────────────────────────────────────────────────
    const body        = document.body;
    const timeDisplay = document.getElementById('timeDisplay');
    const timeLabel   = document.getElementById('timeLabel');
    const ringProg    = document.getElementById('ringProg');
    const mainBtn     = document.getElementById('mainBtn');
    const cancelBtn   = document.getElementById('cancelBtn');

    // Init ring
    ringProg.style.strokeDasharray  = CIRCUM;
    ringProg.style.strokeDashoffset = CIRCUM;

    // ─── Presets ─────────────────────────────────────────────────────────────
    function setPreset(secs) {
      if (torchOn) return;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      document.getElementById('inpHr').value  = h;
      document.getElementById('inpMin').value = m;
      document.getElementById('inpSec').value = s;
      updateIdleDisplay(secs);
    }

    function getInputSeconds() {
      const h = parseInt(document.getElementById('inpHr').value)  || 0;
      const m = parseInt(document.getElementById('inpMin').value) || 0;
      const s = parseInt(document.getElementById('inpSec').value) || 0;
      return h * 3600 + m * 60 + s;
    }

    function updateIdleDisplay(secs) {
      if (!torchOn) {
        timeDisplay.textContent = formatTime(secs);
        timeLabel.textContent   = secs > 0 ? 'duration' : 'set timer';
      }
    }

    // Sync display as user types
    ['inpHr','inpMin','inpSec'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        updateIdleDisplay(getInputSeconds());
      });
    });

    // ─── Format ──────────────────────────────────────────────────────────────
    function formatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
      return `${pad(m)}:${pad(s)}`;
    }
    function pad(n) { return String(n).padStart(2, '0'); }

    // ─── Main button handler ─────────────────────────────────────────────────
    async function handleMain() {
      if (torchOn) {
        // Manual off
        await turnOff();
      } else {
        const secs = getInputSeconds();
        if (secs <= 0) { showToast('Set a duration first!'); return; }
        await turnOn(secs);
      }
    }

    function handleCancel() {
      turnOff();
    }

    // ─── Torch ON ────────────────────────────────────────────────────────────
    async function turnOn(secs) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        track  = stream.getVideoTracks()[0];
        const cap = track.getCapabilities();
        if (!cap.torch) {
          stopStream();
          showToast('Torch not supported on this device/browser.');
          return;
        }
        await track.applyConstraints({ advanced: [{ torch: true }] });
      } catch (e) {
        showToast('Camera access denied. Please allow camera permission.');
        stopStream();
        return;
      }

      torchOn    = true;
      timerTotal = secs;
      timerLeft  = secs;
      body.classList.add('torch-on');
      mainBtn.textContent = 'TURN OFF';
      cancelBtn.classList.add('visible');
      timeLabel.textContent = 'remaining';

      // Disable inputs & presets
      ['inpHr','inpMin','inpSec'].forEach(id => document.getElementById(id).disabled = true);
      document.querySelectorAll('.preset-btn').forEach(b => b.disabled = true);

      startCountdown();
    }

    // ─── Countdown ───────────────────────────────────────────────────────────
    function startCountdown() {
      updateRing();
      countdown = setInterval(() => {
        timerLeft--;
        updateRing();
        if (timerLeft <= 0) {
          clearInterval(countdown);
          turnOff(true);
        }
      }, 1000);
    }

    function updateRing() {
      timeDisplay.textContent = formatTime(timerLeft);
      const progress  = timerTotal > 0 ? timerLeft / timerTotal : 0;
      const offset    = CIRCUM * (1 - progress);
      ringProg.style.strokeDashoffset = offset;
    }

    // ─── Torch OFF ───────────────────────────────────────────────────────────
    async function turnOff(auto = false) {
      clearInterval(countdown);
      if (track) {
        try { await track.applyConstraints({ advanced: [{ torch: false }] }); } catch(e){}
      }
      stopStream();

      torchOn = false;
      body.classList.remove('torch-on');
      mainBtn.textContent = 'START TORCH';
      cancelBtn.classList.remove('visible');

      // Re-enable inputs
      ['inpHr','inpMin','inpSec'].forEach(id => document.getElementById(id).disabled = false);
      document.querySelectorAll('.preset-btn').forEach(b => b.disabled = false);

      // Reset ring and display
      ringProg.style.strokeDashoffset = CIRCUM;
      const secs = getInputSeconds();
      timeDisplay.textContent = formatTime(secs);
      timeLabel.textContent   = secs > 0 ? 'duration' : 'set timer';

      if (auto) showToast('Timer finished — torch off!', true);
    }

    function stopStream() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; track = null; }
    }

    // ─── Toast ───────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, success = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'show' + (success ? ' success' : '');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ''; }, 3500);
    }

    // ─── Cleanup ─────────────────────────────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && torchOn) turnOff();
    });

    // Init display
    updateIdleDisplay(getInputSeconds());
  </script>
</body>
</html>
