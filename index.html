<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Torch</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --off-bg: #0a0a0a;
      --on-bg: #fff8e7;
      --btn-off: #1e1e1e;
      --btn-on: #ffcc44;
      --text-off: #444;
      --text-on: #7a5500;
      --glow: rgba(255, 200, 50, 0.6);
      --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--off-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background var(--transition);
      overflow: hidden;
      user-select: none;
    }

    body.on {
      background: var(--on-bg);
    }

    /* Radial light bloom when ON */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 30%, rgba(255,220,80,0.45) 0%, transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
      z-index: 0;
    }
    body.on::before { opacity: 1; }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Torch icon */
    .torch-icon {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .torch-icon svg {
      width: 100%;
      height: 100%;
      transition: filter var(--transition), transform var(--transition);
      filter: drop-shadow(0 0 0px #ffcc44);
    }
    body.on .torch-icon svg {
      filter: drop-shadow(0 0 18px #ffcc44) drop-shadow(0 0 40px #ffd966);
      transform: scale(1.08);
    }

    /* Rays */
    .rays {
      position: absolute;
      inset: -30px;
      pointer-events: none;
    }
    .ray {
      position: absolute;
      top: 50%; left: 50%;
      width: 2px;
      height: 0;
      background: linear-gradient(to top, rgba(255,210,50,0.7), transparent);
      transform-origin: bottom center;
      border-radius: 1px;
      opacity: 0;
      transition: height 0.5s ease, opacity 0.5s ease;
    }
    body.on .ray {
      height: 50px;
      opacity: 1;
    }
    /* 8 rays fanning out */
    .ray:nth-child(1)  { transform: translateX(-50%) rotate(0deg); }
    .ray:nth-child(2)  { transform: translateX(-50%) rotate(45deg); }
    .ray:nth-child(3)  { transform: translateX(-50%) rotate(90deg); }
    .ray:nth-child(4)  { transform: translateX(-50%) rotate(135deg); }
    .ray:nth-child(5)  { transform: translateX(-50%) rotate(180deg); }
    .ray:nth-child(6)  { transform: translateX(-50%) rotate(225deg); }
    .ray:nth-child(7)  { transform: translateX(-50%) rotate(270deg); }
    .ray:nth-child(8)  { transform: translateX(-50%) rotate(315deg); }

    /* Big toggle button */
    .toggle-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 3px solid #2a2a2a;
      background: var(--btn-off);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--text-off);
      text-transform: uppercase;
      box-shadow:
        inset 0 -4px 10px rgba(0,0,0,0.6),
        0 4px 20px rgba(0,0,0,0.6),
        0 0 0px transparent;
      transition:
        background var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition),
        transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .toggle-btn:active {
      transform: scale(0.94);
    }
    body.on .toggle-btn {
      background: var(--btn-on);
      border-color: #e6aa00;
      color: var(--text-on);
      box-shadow:
        inset 0 -4px 10px rgba(180,120,0,0.3),
        0 4px 20px rgba(255,180,0,0.35),
        0 0 50px var(--glow),
        0 0 100px rgba(255,200,50,0.2);
    }

    /* Status label */
    .status {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-off);
      transition: color var(--transition), opacity var(--transition);
      opacity: 0.5;
    }
    body.on .status {
      color: var(--text-on);
      opacity: 1;
    }

    /* Error toast */
    #error-msg {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ff6b6b;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 12px 22px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 10;
      max-width: 280px;
      text-align: center;
    }
    #error-msg.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="torch-icon">
      <div class="rays">
        <div class="ray"></div><div class="ray"></div>
        <div class="ray"></div><div class="ray"></div>
        <div class="ray"></div><div class="ray"></div>
        <div class="ray"></div><div class="ray"></div>
      </div>
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Flashlight body -->
        <rect x="24" y="30" width="16" height="26" rx="4" fill="#555" stroke="#888" stroke-width="1.5"/>
        <!-- Head/lens area -->
        <rect x="18" y="18" width="28" height="16" rx="5" fill="#666" stroke="#999" stroke-width="1.5"/>
        <!-- Lens -->
        <ellipse cx="32" cy="18" rx="10" ry="6" fill="#222" stroke="#aaa" stroke-width="1.5"/>
        <!-- Lens glow (shown when on) -->
        <ellipse cx="32" cy="18" rx="7" ry="4" fill="#ffcc44" opacity="0" id="lens-glow"/>
        <!-- Grip lines -->
        <line x1="27" y1="36" x2="37" y2="36" stroke="#888" stroke-width="1" stroke-linecap="round"/>
        <line x1="27" y1="40" x2="37" y2="40" stroke="#888" stroke-width="1" stroke-linecap="round"/>
        <line x1="27" y1="44" x2="37" y2="44" stroke="#888" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>

    <button class="toggle-btn" id="toggleBtn" onclick="toggleTorch()">OFF</button>
    <div class="status" id="statusLabel">Torch is off</div>

  </div>

  <div id="error-msg"></div>

  <script>
    let torchOn = false;
    let stream = null;
    let track = null;

    async function toggleTorch() {
      if (!torchOn) {
        await turnOn();
      } else {
        await turnOff();
      }
    }

    async function turnOn() {
      try {
        // Request camera with torch capability
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        track = stream.getVideoTracks()[0];

        const capabilities = track.getCapabilities();
        if (!capabilities.torch) {
          stopStream();
          showError("Torch not supported on this device/browser.");
          return;
        }

        await track.applyConstraints({ advanced: [{ torch: true }] });

        torchOn = true;
        document.body.classList.add('on');
        document.getElementById('toggleBtn').textContent = 'ON';
        document.getElementById('statusLabel').textContent = 'Torch is on';
        document.getElementById('lens-glow').setAttribute('opacity', '0.95');

      } catch (err) {
        showError("Camera access denied or not available. Please allow camera permission.");
        stopStream();
      }
    }

    async function turnOff() {
      if (track) {
        try {
          await track.applyConstraints({ advanced: [{ torch: false }] });
        } catch (e) {}
      }
      stopStream();
      torchOn = false;
      document.body.classList.remove('on');
      document.getElementById('toggleBtn').textContent = 'OFF';
      document.getElementById('statusLabel').textContent = 'Torch is off';
      document.getElementById('lens-glow').setAttribute('opacity', '0');
    }

    function stopStream() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        track = null;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    // Cleanup on page hide
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && torchOn) turnOff();
    });
  </script>
</body>
</html>
